
version: "3.9"

services:

  crowd-analysis:
    build: .
    container_name: crowd_analysis_api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - ENVIRONMENT=production
      - DEBUG=false

    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

