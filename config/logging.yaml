# =============================================================================
# config/logging.yaml
# Structured logging configuration for the Crowd Analysis System.
#
# Loaded at application start via:
#   import yaml, logging.config
#   with open("config/logging.yaml") as f:
#       logging.config.dictConfig(yaml.safe_load(f))
#
# The log level for the root logger is overridden at runtime by the
# LOG_LEVEL environment variable (see config/settings.py).
# =============================================================================

version: 1
disable_existing_loggers: false

# ---------------------------------------------------------------------------
# Formatters
# ---------------------------------------------------------------------------
formatters:

  standard:
    # Human-readable format for local development.
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

  json:
    # Structured JSON format for production log aggregators (Loki, CloudWatch…).
    # Requires `python-json-logger` package.
    (): pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(lineno)d %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

# ---------------------------------------------------------------------------
# Handlers
# ---------------------------------------------------------------------------
handlers:

  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard      # Switch to 'json' in production
    stream: ext://sys.stdout

  rotating_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/crowd_analysis.log
    maxBytes: 10485760       # 10 MB
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: logs/crowd_analysis_errors.log
    maxBytes: 5242880        # 5 MB
    backupCount: 3
    encoding: utf-8

# ---------------------------------------------------------------------------
# Module-level loggers
# (Levels here can be overridden without touching application code.)
# ---------------------------------------------------------------------------
loggers:

  crowd_analysis:            # Root package logger
    level: INFO
    handlers: [console, rotating_file, error_file]
    propagate: false

  crowd_analysis.detection:
    level: INFO
    propagate: true

  crowd_analysis.tracking:
    level: INFO
    propagate: true

  crowd_analysis.behavior:
    level: INFO
    propagate: true

  crowd_analysis.pipeline:
    level: DEBUG
    propagate: true

  crowd_analysis.api:
    level: INFO
    propagate: true

  # Silence noisy third-party libraries in production
  ultralytics:
    level: WARNING
    propagate: false

  uvicorn:
    level: INFO
    propagate: false

  uvicorn.error:
    level: INFO
    propagate: false

  uvicorn.access:
    level: WARNING           # Set to INFO to log every HTTP/WS request
    propagate: false

# ---------------------------------------------------------------------------
# Root logger — catches anything not matched above
# ---------------------------------------------------------------------------
root:
  level: WARNING
  handlers: [console]
