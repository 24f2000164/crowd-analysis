<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crowd Analysis Dashboard</title>

  <!-- TailwindCSS via CDN (no build step required) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' },
          },
        },
      },
    };
  </script>

  <style>
    /* ── Scrollbar ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }

    /* ── Video canvas ─────────────────────────────────────────────── */
    #live-frame {
      object-fit: contain;
      background: #000;
      width: 100%;
      max-height: 420px;
    }

    /* ── Behaviour badge colours ──────────────────────────────────── */
    .badge-normal      { @apply bg-green-600; }
    .badge-running     { @apply bg-yellow-500; }
    .badge-panic       { @apply bg-red-600 animate-pulse; }
    .badge-violence    { @apply bg-red-700 animate-pulse; }
    .badge-suspicion   { @apply bg-orange-500; }
    .badge-crowd_surge { @apply bg-purple-600; }
    .badge-unknown     { @apply bg-gray-500; }

    /* ── Density level colours ────────────────────────────────────── */
    .density-low_density      { @apply text-green-400; }
    .density-medium_density   { @apply text-yellow-400; }
    .density-high_density     { @apply text-orange-400; }
    .density-critical_density { @apply text-red-400 font-bold; }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">

  <!-- ══ Header ══════════════════════════════════════════════════════════ -->
  <header class="bg-gray-900 border-b border-gray-700 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🎥</span>
      <h1 class="text-lg font-bold tracking-tight">Crowd Analysis</h1>
      <span class="text-xs text-gray-500">Real-time Dashboard</span>
    </div>

    <div class="flex items-center gap-4 text-sm">
      <!-- WebSocket status indicator -->
      <span id="ws-indicator" class="flex items-center gap-1.5">
        <span id="ws-dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
        <span id="ws-label" class="text-gray-400">Disconnected</span>
      </span>

      <!-- Stream ID input -->
      <input
        id="stream-id-input"
        type="text"
        placeholder="Stream ID"
        class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-xs w-36 focus:outline-none focus:border-brand"
      />
      <button
        id="btn-connect"
        class="bg-brand hover:bg-brand-dark text-white text-xs font-medium rounded px-3 py-1.5 transition"
      >
        Connect
      </button>
      <button
        id="btn-disconnect"
        class="bg-gray-700 hover:bg-gray-600 text-white text-xs font-medium rounded px-3 py-1.5 transition hidden"
      >
        Disconnect
      </button>
    </div>
  </header>

  <!-- ══ Main content ════════════════════════════════════════════════════ -->
  <main class="flex-1 p-4 grid grid-cols-12 gap-4">

    <!-- ── Left: Live video + behaviour ─────────────────────────────── -->
    <section class="col-span-12 xl:col-span-8 flex flex-col gap-4">

      <!-- Live frame -->
      <div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-700">
        <div class="flex items-center justify-between px-4 py-2 border-b border-gray-700">
          <span class="text-sm font-semibold">Live Stream</span>
          <span id="frame-fps" class="text-xs text-gray-400">–– FPS</span>
        </div>
        <img id="live-frame" src="" alt="No stream connected" />
      </div>

      <!-- Stat bar: People · Behaviour · Density · Frame -->
      <div class="grid grid-cols-4 gap-3">

        <!-- People count -->
        <div class="bg-gray-900 rounded-xl border border-gray-700 px-4 py-3">
          <p class="text-xs text-gray-400 mb-1">People</p>
          <p id="stat-people" class="text-3xl font-bold">–</p>
        </div>

        <!-- Current behaviour -->
        <div class="bg-gray-900 rounded-xl border border-gray-700 px-4 py-3">
          <p class="text-xs text-gray-400 mb-1">Behaviour</p>
          <span id="stat-behaviour" class="inline-block px-2 py-0.5 rounded text-sm font-semibold badge-unknown">–</span>
          <p id="stat-confidence" class="text-xs text-gray-500 mt-1">conf: –</p>
        </div>

        <!-- Density -->
        <div class="bg-gray-900 rounded-xl border border-gray-700 px-4 py-3">
          <p class="text-xs text-gray-400 mb-1">Density</p>
          <p id="stat-density-level" class="text-base font-semibold density-low_density">–</p>
          <p id="stat-density-value" class="text-xs text-gray-500 mt-1">–</p>
        </div>

        <!-- Frame index -->
        <div class="bg-gray-900 rounded-xl border border-gray-700 px-4 py-3">
          <p class="text-xs text-gray-400 mb-1">Frame</p>
          <p id="stat-frame" class="text-3xl font-bold">–</p>
        </div>

      </div>

      <!-- Charts row -->
      <div class="grid grid-cols-2 gap-4">

        <!-- People count over time -->
        <div class="bg-gray-900 rounded-xl border border-gray-700 p-4">
          <p class="text-sm font-semibold mb-3">People Count</p>
          <canvas id="chart-people" height="140"></canvas>
        </div>

        <!-- Behaviour frequency -->
        <div class="bg-gray-900 rounded-xl border border-gray-700 p-4">
          <p class="text-sm font-semibold mb-3">Behaviour Frequency</p>
          <canvas id="chart-behaviour" height="140"></canvas>
        </div>

      </div>

    </section>

    <!-- ── Right: Metrics + Events ─────────────────────────────────── -->
    <section class="col-span-12 xl:col-span-4 flex flex-col gap-4">

      <!-- Pipeline performance -->
      <div class="bg-gray-900 rounded-xl border border-gray-700 p-4">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-semibold">Performance</p>
          <button id="btn-refresh-metrics" class="text-xs text-brand hover:underline">Refresh</button>
        </div>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-gray-400">FPS</span>        <span id="perf-fps"-></span></div>
          <div class="flex justify-between"><span class="text-gray-400">Detect</span>     <span id="perf-detect">–</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Track</span>      <span id="perf-track">–</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Behaviour</span> <span id="perf-behavior">–</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Total</span>      <span id="perf-total">–</span></div>
          <div class="flex justify-between border-t border-gray-700 pt-2">
            <span class="text-gray-400">Frames</span>
            <span id="perf-frames">–</span>
          </div>
        </div>
      </div>

      <!-- Density chart over time -->
      <div class="bg-gray-900 rounded-xl border border-gray-700 p-4">
        <p class="text-sm font-semibold mb-3">Density Over Time</p>
        <canvas id="chart-density" height="110"></canvas>
      </div>

      <!-- Recent events -->
      <div class="bg-gray-900 rounded-xl border border-gray-700 p-4 flex-1 min-h-0">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-semibold">Recent Events</p>
          <button id="btn-refresh-events" class="text-xs text-brand hover:underline">Refresh</button>
        </div>
        <div id="events-list" class="space-y-2 overflow-y-auto max-h-72 pr-1 text-xs">
          <p class="text-gray-500 italic">No events yet.</p>
        </div>
      </div>

    </section>

  </main>

  <!-- ══ Scripts ══════════════════════════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    // ── Config ─────────────────────────────────────────────────────────
    const API_BASE   = window.location.origin;
    const WS_BASE    = API_BASE.replace(/^http/, 'ws');
    const MAX_POINTS = 120;   // chart history window

    // ── DOM refs ───────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const el = {
      wsLabel:       $('ws-label'),
      wsDot:         $('ws-dot'),
      streamInput:   $('stream-id-input'),
      btnConnect:    $('btn-connect'),
      btnDisconnect: $('btn-disconnect'),
      liveFrame:     $('live-frame'),
      frameFps:      $('frame-fps'),
      statPeople:    $('stat-people'),
      statBehaviour: $('stat-behaviour'),
      statConf:      $('stat-confidence'),
      statDensityLv: $('stat-density-level'),
      statDensityV:  $('stat-density-value'),
      statFrame:     $('stat-frame'),
      perfFps:       $('perf-fps'),
      perfDetect:    $('perf-detect'),
      perfTrack:     $('perf-track'),
      perfBehavior:  $('perf-behavior'),
      perfTotal:     $('perf-total'),
      perfFrames:    $('perf-frames'),
      eventsList:    $('events-list'),
    };

    // ── State ──────────────────────────────────────────────────────────
    let ws             = null;
    let pendingJpeg    = null;
    let behaviourCounts = {};
    const peopleData   = [];
    const densityData  = [];
    const labels       = [];

    // ── Chart initialisation ───────────────────────────────────────────
    const chartDefaults = {
      responsive:          true,
      maintainAspectRatio: false,
      animation:           { duration: 0 },
      plugins:             { legend: { display: false } },
      scales: {
        x: { display: false },
        y: {
          ticks:  { color: '#9ca3af', font: { size: 10 } },
          grid:   { color: '#374151' },
          border: { display: false },
        },
      },
    };

    const peopleChart = new Chart($('chart-people').getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data:            peopleData,
          borderColor:     '#6366f1',
          backgroundColor: 'rgba(99,102,241,0.15)',
          fill:            true,
          tension:         0.3,
          pointRadius:     0,
          borderWidth:     2,
        }],
      },
      options: {
        ...chartDefaults,
        scales: {
          ...chartDefaults.scales,
          y: { ...chartDefaults.scales.y, min: 0 },
        },
      },
    });

    const densityChart = new Chart($('chart-density').getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data:            densityData,
          borderColor:     '#f59e0b',
          backgroundColor: 'rgba(245,158,11,0.1)',
          fill:            true,
          tension:         0.3,
          pointRadius:     0,
          borderWidth:     2,
        }],
      },
      options: {
        ...chartDefaults,
        scales: {
          ...chartDefaults.scales,
          y: { ...chartDefaults.scales.y, min: 0 },
        },
      },
    });

    const behaviourChart = new Chart($('chart-behaviour').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels:   [],
        datasets: [{ data: [], backgroundColor: [], borderWidth: 0 }],
      },
      options: {
        responsive:          true,
        maintainAspectRatio: false,
        animation:           { duration: 300 },
        plugins: {
          legend: {
            display:  true,
            position: 'right',
            labels: { color: '#d1d5db', font: { size: 10 }, boxWidth: 12 },
          },
        },
      },
    });

    const BEHAVIOUR_COLORS = {
      normal:       '#22c55e',
      running:      '#eab308',
      panic:        '#ef4444',
      violence:     '#b91c1c',
      suspicion:    '#f97316',
      crowd_surge:  '#a855f7',
      insufficient_data: '#6b7280',
    };

    // ── WebSocket ──────────────────────────────────────────────────────
    function setWsStatus(state) {
      const configs = {
        connected:    { dot: 'bg-green-500',  label: 'Connected',    labelClass: 'text-green-400' },
        connecting:   { dot: 'bg-yellow-500', label: 'Connecting…',  labelClass: 'text-yellow-400' },
        disconnected: { dot: 'bg-gray-500',   label: 'Disconnected', labelClass: 'text-gray-400' },
        error:        { dot: 'bg-red-500',    label: 'Error',        labelClass: 'text-red-400' },
      };
      const cfg = configs[state] || configs.disconnected;
      el.wsDot.className   = `w-2 h-2 rounded-full ${cfg.dot}`;
      el.wsLabel.className = `text-sm ${cfg.labelClass}`;
      el.wsLabel.textContent = cfg.label;
    }

    function connectWs(streamId) {
      if (ws) ws.close();
      const url = `${WS_BASE}/ws/stream/${streamId}`;
      setWsStatus('connecting');
      ws = new WebSocket(url);

      ws.onopen = () => {
        setWsStatus('connected');
        el.btnConnect.classList.add('hidden');
        el.btnDisconnect.classList.remove('hidden');
      };

      ws.onclose = () => {
        setWsStatus('disconnected');
        el.btnConnect.classList.remove('hidden');
        el.btnDisconnect.classList.add('hidden');
        ws = null;
      };

      ws.onerror = () => setWsStatus('error');

      ws.onmessage = handleWsMessage;
    }

    function handleWsMessage(ev) {
      if (typeof ev.data === 'string') {
        // JSON metadata frame
        try {
          const meta = JSON.parse(ev.data);
          updateStats(meta);
        } catch { /* ignore */ }
      } else {
        // Binary — JPEG frame
        const blob = new Blob([ev.data], { type: 'image/jpeg' });
        const url  = URL.createObjectURL(blob);
        if (pendingJpeg) URL.revokeObjectURL(pendingJpeg);
        pendingJpeg = url;
        el.liveFrame.src = url;
      }
    }

    // ── Stats update ───────────────────────────────────────────────────
    function updateStats(meta) {
      const trackCount = meta.track_count ?? 0;
      const behavior   = meta.behavior?.behavior ?? 'unknown';
      const conf       = meta.behavior?.confidence ?? 0;
      const fps        = meta.fps ?? 0;
      const frameIdx   = meta.frame_index ?? 0;

      // Compute density from track count and assumed frame size (1280×720)
      const frameW   = 1280;
      const frameH   = 720;
      const density  = trackCount / (frameW * frameH);
      const densityLevel = classifyDensity(density);

      // Stat cards
      el.statPeople.textContent    = trackCount;
      el.statFrame.textContent     = frameIdx;
      el.frameFps.textContent      = `${fps.toFixed(1)} FPS`;

      // Behaviour badge
      el.statBehaviour.textContent = behavior;
      el.statBehaviour.className   = `inline-block px-2 py-0.5 rounded text-sm font-semibold badge-${behavior}`;
      el.statConf.textContent      = `conf: ${(conf * 100).toFixed(0)}%`;

      // Density
      el.statDensityLv.textContent = densityLevel.replace(/_/g, ' ');
      el.statDensityLv.className   = `text-base font-semibold density-${densityLevel}`;
      el.statDensityV.textContent  = density.toExponential(2);

      // Roll charts
      const tick = frameIdx.toString();
      pushData(labels, tick);
      pushData(peopleData, trackCount);
      pushData(densityData, parseFloat(density.toExponential(6)));

      peopleChart.update('none');
      densityChart.update('none');

      // Behaviour frequency
      behaviourCounts[behavior] = (behaviourCounts[behavior] ?? 0) + 1;
      updateBehaviourChart();
    }

    function pushData(arr, val) {
      arr.push(val);
      if (arr.length > MAX_POINTS) arr.shift();
    }

    function classifyDensity(d) {
      if (d < 0.00001) return 'low_density';
      if (d < 0.00003) return 'medium_density';
      if (d < 0.00006) return 'high_density';
      return 'critical_density';
    }

    function updateBehaviourChart() {
      const entries = Object.entries(behaviourCounts)
            .sort((a, b) => b[1] - a[1]);
      behaviourChart.data.labels   = entries.map(e => e[0]);
      behaviourChart.data.datasets[0].data            = entries.map(e => e[1]);
      behaviourChart.data.datasets[0].backgroundColor = entries.map(
        e => BEHAVIOUR_COLORS[e[0]] ?? '#6b7280'
      );
      behaviourChart.update('none');
    }

    // ── /metrics polling ──────────────────────────────────────────────
    async function fetchMetrics() {
      try {
        const res  = await fetch(`${API_BASE}/metrics`);
        if (!res.ok) return;
        const data = await res.json();

        el.perfFps.textContent     = `${data.fps ?? '–'} fps`;
        el.perfDetect.textContent  = `${data.detect_ms ?? '–'} ms`;
        el.perfTrack.textContent   = `${data.track_ms ?? '–'} ms`;
        el.perfBehavior.textContent = `${data.behavior_ms ?? '–'} ms`;
        el.perfTotal.textContent   = `${data.total_ms ?? '–'} ms`;
        el.perfFrames.textContent  = data.frames_processed ?? '–';
      } catch { /* network unavailable */ }
    }

    // ── /dashboard/events polling ─────────────────────────────────────
    async function fetchEvents() {
      try {
        const res  = await fetch(`${API_BASE}/dashboard/events?limit=20`);
        if (!res.ok) return;
        const data = await res.json();

        if (!data.events?.length) {
          el.eventsList.innerHTML = '<p class="text-gray-500 italic">No events yet.</p>';
          return;
        }

        el.eventsList.innerHTML = data.events.map(ev => {
          const ts       = new Date(ev.timestamp).toLocaleTimeString();
          const badgeCls = `badge-${ev.behavior}`;
          return `
            <div class="flex items-start justify-between gap-2 bg-gray-800 rounded p-2">
              <div>
                <span class="inline-block px-1.5 py-0.5 rounded text-xs font-semibold ${badgeCls}">${ev.behavior}</span>
                <span class="text-gray-400 ml-1">stream: ${ev.stream_id?.slice(0, 8) ?? '–'}</span>
              </div>
              <div class="text-right text-gray-400 shrink-0">
                <div>${ts}</div>
                <div>${ev.people_count} people · ${(ev.confidence * 100).toFixed(0)}%</div>
              </div>
            </div>`;
        }).join('');
      } catch { /* network unavailable */ }
    }

    // ── Button handlers ───────────────────────────────────────────────
    el.btnConnect.addEventListener('click', () => {
      const id = el.streamInput.value.trim();
      if (id) connectWs(id);
    });

    el.btnDisconnect.addEventListener('click', () => {
      if (ws) { ws.close(); ws = null; }
    });

    el.streamInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') el.btnConnect.click();
    });

    $('btn-refresh-metrics').addEventListener('click', fetchMetrics);
    $('btn-refresh-events').addEventListener('click', fetchEvents);

    // ── Polling timers ────────────────────────────────────────────────
    fetchMetrics();
    fetchEvents();
    setInterval(fetchMetrics, 5_000);
    setInterval(fetchEvents,  8_000);

  })();
  </script>

</body>
</html>
